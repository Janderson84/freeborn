<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06121e"/>
      <stop offset="100%" stop-color="#0f2033"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f2033"/>
      <stop offset="100%" stop-color="#1a3150"/>
    </linearGradient>
    <linearGradient id="coverSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.12)"/>
    </linearGradient>
    <linearGradient id="goldFoil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c84a"/>
      <stop offset="40%" stop-color="#b08525"/>
      <stop offset="70%" stop-color="#d4a832"/>
      <stop offset="100%" stop-color="#8a6419"/>
    </linearGradient>
    <linearGradient id="pages" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ddd5c0"/>
      <stop offset="100%" stop-color="#f0e8d4"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.45)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="8" dy="12" stdDeviation="14" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <clipPath id="coverClip">
      <polygon points="58,28 358,14 362,506 58,506"/>
    </clipPath>
  </defs>

  <!-- Drop shadow base -->
  <ellipse cx="210" cy="510" rx="155" ry="10" fill="rgba(0,0,0,0.25)"/>

  <!-- Page edges (right side of binder, slight perspective) -->
  <polygon points="358,14 382,22 382,498 362,506" fill="url(#pages)"/>
  <!-- Page edge lines -->
  <line x1="362" y1="50" x2="382" y2="52" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="80" x2="382" y2="82" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="110" x2="382" y2="112" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="140" x2="382" y2="142" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="170" x2="382" y2="172" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="200" x2="382" y2="202" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="230" x2="382" y2="232" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="260" x2="382" y2="262" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="290" x2="382" y2="292" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="320" x2="382" y2="322" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="350" x2="382" y2="352" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="380" x2="382" y2="382" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="410" x2="382" y2="412" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="440" x2="382" y2="442" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>
  <line x1="362" y1="470" x2="382" y2="472" stroke="#c8b898" stroke-width="0.5" opacity="0.6"/>

  <!-- Spine -->
  <polygon points="40,32 58,28 58,506 40,500" fill="url(#spine)"/>
  <!-- Spine gold rule lines -->
  <line x1="40" y1="50" x2="58" y2="50" stroke="#b08525" stroke-width="0.8" opacity="0.6"/>
  <line x1="40" y1="482" x2="58" y2="482" stroke="#b08525" stroke-width="0.8" opacity="0.6"/>
  <!-- Spine text (rotated) -->
  <text transform="translate(49,420) rotate(-90)" font-family="'Arial Narrow', Arial, sans-serif" font-size="9" letter-spacing="3" fill="#b08525" text-anchor="middle" font-weight="bold">FREEBORN · ENERGY INDEPENDENCE</text>

  <!-- Main cover -->
  <polygon points="58,28 358,14 362,506 58,506" fill="url(#cover)" filter="url(#dropShadow)"/>

  <!-- Cover sheen overlay -->
  <polygon points="58,28 358,14 362,506 58,506" fill="url(#coverSheen)"/>

  <!-- Top gold rule -->
  <line x1="72" y1="38" x2="352" y2="26" stroke="url(#goldFoil)" stroke-width="1.5"/>
  <line x1="72" y1="44" x2="352" y2="32" stroke="url(#goldFoil)" stroke-width="0.5" opacity="0.5"/>

  <!-- Bottom gold rule -->
  <line x1="72" y1="488" x2="352" y2="488" stroke="url(#goldFoil)" stroke-width="1.5"/>
  <line x1="72" y1="494" x2="352" y2="494" stroke="url(#goldFoil)" stroke-width="0.5" opacity="0.5"/>

  <!-- Eagle/emblem seal circle -->
  <circle cx="210" cy="138" r="62" fill="none" stroke="url(#goldFoil)" stroke-width="1.5"/>
  <circle cx="210" cy="138" r="55" fill="none" stroke="url(#goldFoil)" stroke-width="0.5" opacity="0.5"/>

  <!-- Stars around seal -->
  <text x="210" y="86" text-anchor="middle" font-size="10" fill="url(#goldFoil)" font-family="Arial">★  ★  ★  ★  ★</text>
  <text x="210" y="196" text-anchor="middle" font-size="10" fill="url(#goldFoil)" font-family="Arial">★  ★  ★  ★  ★</text>

  <!-- Eagle silhouette (simplified vector) -->
  <!-- Body -->
  <ellipse cx="210" cy="142" rx="18" ry="22" fill="url(#goldFoil)" opacity="0.9"/>
  <!-- Head -->
  <circle cx="210" cy="118" r="11" fill="url(#goldFoil)" opacity="0.9"/>
  <!-- Beak -->
  <polygon points="218,120 224,122 218,124" fill="#0f2033"/>
  <!-- Left wing -->
  <path d="M194,134 Q168,118 156,128 Q168,140 194,148Z" fill="url(#goldFoil)" opacity="0.85"/>
  <!-- Right wing -->
  <path d="M226,134 Q252,118 264,128 Q252,140 226,148Z" fill="url(#goldFoil)" opacity="0.85"/>
  <!-- Tail feathers -->
  <path d="M200,163 Q210,172 220,163 Q216,178 210,180 Q204,178 200,163Z" fill="url(#goldFoil)" opacity="0.85"/>
  <!-- Talons -->
  <line x1="204" y1="162" x2="198" y2="170" stroke="url(#goldFoil)" stroke-width="2"/>
  <line x1="216" y1="162" x2="222" y2="170" stroke="url(#goldFoil)" stroke-width="2"/>
  <!-- Eye -->
  <circle cx="206" cy="116" r="2.5" fill="#0f2033"/>

  <!-- FREEBORN wordmark -->
  <text x="210" y="232" text-anchor="middle" font-family="'Arial Narrow', 'Impact', Arial, sans-serif" font-size="28" letter-spacing="8" fill="url(#goldFoil)" font-weight="bold">FREEBORN</text>

  <!-- Rule under wordmark -->
  <line x1="100" y1="242" x2="320" y2="242" stroke="url(#goldFoil)" stroke-width="1"/>

  <!-- Main title -->
  <text x="210" y="285" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#f5efe2" font-style="italic" font-weight="bold">Energy</text>
  <text x="210" y="314" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#f5efe2" font-style="italic" font-weight="bold">Independence</text>

  <!-- Subtitle rule -->
  <line x1="120" y1="328" x2="300" y2="328" stroke="url(#goldFoil)" stroke-width="0.8" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="210" y="352" text-anchor="middle" font-family="'Arial Narrow', Arial, sans-serif" font-size="11" letter-spacing="2.5" fill="#b08525" font-weight="bold">THE BLUEPRINT</text>

  <!-- Descriptor -->
  <text x="210" y="395" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="rgba(245,239,226,0.7)" font-style="italic">How to cut your energy bills</text>
  <text x="210" y="414" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="rgba(245,239,226,0.7)" font-style="italic">by $200–$400 every month</text>

  <!-- Bottom bar -->
  <rect x="58" y="452" width="304" height="36" fill="rgba(164,24,42,0.85)"/>
  <text x="210" y="475" text-anchor="middle" font-family="'Arial Narrow', Arial, sans-serif" font-size="10" letter-spacing="2" fill="#f5efe2" font-weight="bold">DIGITAL EDITION · INSTANT ACCESS</text>

  <!-- Cover edge highlight -->
  <line x1="58" y1="28" x2="58" y2="506" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
</svg>
